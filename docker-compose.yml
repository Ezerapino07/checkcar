version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: autogestion
      POSTGRES_USER: autogestion_user
      POSTGRES_PASSWORD: autogestion_pass_2024
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autogestion_user -d autogestion"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: always
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://autogestion_user:autogestion_pass_2024@db:5432/autogestion
      JWT_SECRET: tu_clave_secreta_super_segura_cambiar_esto_2024
      PORT: 3001
      NODE_ENV: production
      FRONTEND_URL: http://localhost:5173
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3001/api
    depends_on:
      - backend

volumes:
  pgdata:
